<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>{{TITLE}}</title>
<style>
  /* ─────────────────  WHITE PAPER TEMPLATE  ───────────────── */
  /* Page setup A4, margins, running headers and pagination     */

  @page {
    size: A4;
    margin: 22mm 20mm 25mm 20mm;
    @top-left {
      content: "{{SERIES}}";
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-size: 9pt;
      color: #6b6452;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    @top-right {
      content: "CAIO Academy";
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-size: 9pt;
      color: #6b6452;
      letter-spacing: 0.06em;
    }
    @bottom-center {
      content: counter(page) " / " counter(pages);
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-size: 9pt;
      color: #6b6452;
    }
    @bottom-right {
      content: "© 2026 CAIO Academy";
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-size: 8pt;
      color: #aaa194;
    }
  }

  /* Cover page — no headers/footers */
  @page :first {
    margin: 0;
    @top-left { content: ""; }
    @top-right { content: ""; }
    @bottom-center { content: ""; }
    @bottom-right { content: ""; }
  }

  /* TOC page — light header */
  @page toc {
    @top-left { content: "Sommaire"; }
  }

  /* ─────────────────  TYPOGRAPHY  ───────────────── */

  html, body {
    font-family: "EB Garamond", "Iowan Old Style", Georgia, "Times New Roman", serif;
    font-size: 11pt;
    line-height: 1.55;
    color: #1a1a1a;
    background: #ffffff;
  }

  /* Initiale agrandie (sans float — incompatible weasyprint 68.x) */
  .body-content > p:first-of-type::first-letter {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: 2.4em;
    color: #8b6f3a;
  }

  h1, h2, h3, h4 {
    font-family: "Playfair Display", Georgia, "Times New Roman", serif;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.15;
    margin-top: 1.4em;
    margin-bottom: 0.5em;
  }

  h1 {
    font-size: 22pt;
    border-bottom: 1px solid #d6cfb8;
    padding-bottom: 0.25em;
    page-break-before: always;
    page-break-after: avoid;
  }
  /* First h1 (intro) — no page break before */
  .body-content > h1:first-child {
    page-break-before: auto;
  }

  h2 {
    font-size: 15pt;
    color: #2a2a2a;
    margin-top: 1.6em;
    page-break-after: avoid;
  }

  h3 {
    font-size: 12.5pt;
    font-style: italic;
    font-weight: 600;
    color: #3a3a3a;
    page-break-after: avoid;
  }

  h4 {
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #5a5a5a;
    page-break-after: avoid;
  }

  p { margin: 0 0 0.7em 0; text-align: justify; hyphens: auto; }

  /* Lists */
  ul, ol { margin: 0.4em 0 0.9em 1.2em; padding: 0; }
  li { margin-bottom: 0.25em; }

  /* Strong / emphasis */
  strong { color: #1a1a1a; font-weight: 700; }
  em { color: #3a3a3a; }

  /* Blockquote */
  blockquote {
    border-left: 3px solid #c9a961;
    padding: 0.6em 1.2em;
    margin: 1em 0;
    background: #faf8f1;
    font-style: italic;
    color: #2a2a2a;
    font-size: 11.5pt;
    page-break-inside: avoid;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    font-size: 10pt;
    page-break-inside: avoid;
  }
  th {
    background: #1a1a1a;
    color: #ffffff;
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 600;
    text-align: left;
    padding: 7pt 9pt;
    border-bottom: 2px solid #c9a961;
  }
  td {
    padding: 6pt 9pt;
    border-bottom: 1px solid #e6e1d4;
    vertical-align: top;
  }
  tr:nth-child(even) td { background: #fafaf7; }

  /* Code blocks (sober) */
  code {
    font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    font-size: 9.5pt;
    background: #f4f1e8;
    padding: 1pt 4pt;
    border-radius: 2pt;
    color: #6b4f1d;
  }
  pre {
    background: #faf8f1;
    border: 1px solid #e6e1d4;
    border-left: 3px solid #c9a961;
    padding: 10pt 14pt;
    font-size: 9.5pt;
    overflow-x: auto;
    margin: 1em 0;
    page-break-inside: avoid;
  }
  pre code { background: none; padding: 0; color: #2a2a2a; }

  /* Horizontal rule */
  hr {
    border: none;
    border-top: 1px solid #d6cfb8;
    margin: 2em auto;
    width: 50%;
  }

  /* Callouts (markdown blockquote starting with **NOTE** etc.) */
  .callout {
    background: #fdf9ea;
    border: 1px solid #e6d49a;
    border-left: 4px solid #c9a961;
    padding: 12pt 14pt;
    margin: 1em 0;
    font-size: 10.5pt;
    page-break-inside: avoid;
  }

  /* ─────────────────  COVER PAGE  ───────────────── */

  .cover {
    page-break-after: always;
    width: 100%;
    height: 297mm;
    box-sizing: border-box;
    padding: 60mm 25mm 25mm 25mm;
    background: linear-gradient(180deg, #ffffff 0%, #faf8f1 100%);
    position: relative;
    color: #1a1a1a;
  }

  .cover::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8mm;
    background: #1a1a1a;
  }

  .cover::after {
    content: "";
    position: absolute;
    bottom: 25mm; left: 25mm;
    width: 28mm; height: 1.5pt;
    background: #c9a961;
  }

  .cover-brand {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 13pt;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #1a1a1a;
    margin-bottom: 4mm;
  }

  .cover-brand-rule {
    width: 36mm;
    border-top: 1.5pt solid #c9a961;
    margin-bottom: 14mm;
  }

  .cover-series {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 10.5pt;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8b6f3a;
    margin-bottom: 10mm;
  }

  .cover-title {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 36pt;
    font-weight: 700;
    line-height: 1.05;
    color: #0a0a0a;
    margin: 0 0 8mm 0;
    max-width: 145mm;
    border: none;
    padding: 0;
    page-break-before: auto;
    page-break-after: auto;
  }

  .cover-subtitle {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 16pt;
    font-style: italic;
    color: #4a4a4a;
    line-height: 1.35;
    margin-bottom: 22mm;
    max-width: 140mm;
  }

  .cover-meta {
    position: absolute;
    bottom: 38mm;
    left: 25mm;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 10.5pt;
    color: #5a5a5a;
  }
  .cover-meta-line {
    margin-bottom: 1mm;
  }
  .cover-meta-label {
    font-size: 8.5pt;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #8b6f3a;
    margin-right: 3mm;
  }

  .cover-edition {
    position: absolute;
    bottom: 25mm;
    right: 25mm;
    text-align: right;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 9pt;
    color: #6b6452;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ─────────────────  TOC PAGE  ───────────────── */

  .toc-page {
    page: toc;
    page-break-after: always;
    padding-top: 8mm;
  }
  .toc-title {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 24pt;
    font-weight: 700;
    margin: 0 0 4mm 0;
    border-bottom: 1px solid #d6cfb8;
    padding-bottom: 4mm;
    page-break-before: auto;
    page-break-after: auto;
  }
  .toc-list {
    list-style: none;
    padding: 0;
    margin: 8mm 0 0 0;
    font-size: 11pt;
  }
  .toc-list li {
    padding: 4pt 0;
    border-bottom: 1px dotted #d6cfb8;
    display: flex;
    justify-content: space-between;
    font-family: "EB Garamond", Georgia, serif;
  }
  .toc-list li.h2-item { padding-left: 0; font-weight: 600; }
  .toc-list li.h3-item { padding-left: 14pt; font-style: italic; color: #4a4a4a; font-size: 10.5pt; }
  .toc-page-num {
    color: #8b6f3a;
    font-variant-numeric: tabular-nums;
  }

  /* Body wrapper */
  .body-content {
    counter-reset: section;
  }

  /* Page break helpers */
  .page-break { page-break-before: always; }
  .no-break { page-break-inside: avoid; }
</style>
</head>
<body>

<!-- ─── COVER ─── -->
<section class="cover">
  <div class="cover-brand">CAIO Academy</div>
  <div class="cover-brand-rule"></div>
  <div class="cover-series">{{SERIES}}</div>
  <h1 class="cover-title">{{TITLE}}</h1>
  <div class="cover-subtitle">{{SUBTITLE}}</div>
  <div class="cover-meta">
    <div class="cover-meta-line"><span class="cover-meta-label">Auteur</span>{{AUTHOR}}</div>
    <div class="cover-meta-line"><span class="cover-meta-label">Date</span>{{DATE}}</div>
    <div class="cover-meta-line"><span class="cover-meta-label">Édition</span>{{EDITION}}</div>
  </div>
  <div class="cover-edition">White Paper · CAIO Academy</div>
</section>

<!-- ─── TOC ─── -->
<section class="toc-page">
  <h1 class="toc-title">Sommaire</h1>
  <ul class="toc-list">
    {{TOC}}
  </ul>
</section>

<!-- ─── BODY ─── -->
<section class="body-content">
  {{BODY}}
</section>

</body>
</html>
